<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=980, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rahul Thakur Calculator</title>
<meta name="google" content="notranslate" />
<meta http-equiv="Content-Language" content="hi" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #EFEDE8;
  --surface: #FFFFFF;
  --surface2:#E8E5DF;
  --accent:  #1B5E42;
  --text:    #111110;
  --text2:   #6A6560;
  --border:  #C8C3BC;
}

html {
  height: 100dvh;
  overflow: hidden;
  touch-action: manipulation;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  width: 100%;
  background: var(--accent);
  padding: calc(env(safe-area-inset-top, 0px) + 1.5vh) 14px 1.5vh;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hicon {
  width: 11vh; height: 11vh;
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 1.5vh;
  display: flex; align-items: center; justify-content: center;
  font-size: 8vh;
  transition: font-size 0.3s ease;
}
.htext h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 5vh;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.3px;
  line-height: 1.1;
  transition: opacity 0.25s ease;
}

/* ── SCROLL / CONTENT AREA ── */
.scroll {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  width: 100%;
  padding: 1.2vh 14px calc(env(safe-area-inset-bottom, 0px) + 1.5vh);
  display: flex;
  flex-direction: column;
}

/* ── VIEW CONTAINERS ── */
#view-input {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 1vh;
}
#view-result {
  display: none;
  flex-direction: column;
  height: 100%;
  gap: 1.2vh;
}

/* ── SERVICE CARD ── */
.scard {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  border-radius: 2vh;
  border: 2px solid var(--border);
  padding: 1.2vh 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.8vh;
  transition: border-color .15s;
}

.stop { display: flex; align-items: center; }
.sinfo { display: flex; align-items: center; gap: 1.5vh; }
.semoji {
  width: 5.5vh; height: 5.5vh;
  border-radius: 1.2vh;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.8vh;
}
.ec  { background: #E6F4EA; }
.es  { background: #E3EFFE; }
.ecp { background: #FFF4E0; }
.eph { background: #FDEAEA; }

.sname { font-size: 3vh;   font-weight: 700; line-height: 1.2; }
.srate { font-size: 2.5vh; color: var(--text2); margin-top: 0.3vh; font-weight: 600; font-family: Arial, sans-serif; }

/* ── QTY ROW ── */
.qrow { display: flex; width: 100%; height: 7vh; }

.qbtn {
  width: 9vh; height: 100%;
  flex-shrink: 0;
  border: 3px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 5vh; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: background .08s, transform .07s;
  font-family: 'DM Sans', sans-serif; font-weight: 700;
}
.qbtn:first-child { border-radius: 1.5vh 0 0 1.5vh; border-right: none; }
.qbtn:last-child  { border-radius: 0 1.5vh 1.5vh 0; border-left:  none; }
.qbtn:active { background: #CFCBC4; transform: scale(.90); }

.qinp {
  height: 100%; width: 100%;
  border: 2px solid var(--border); border-left: none; border-right: none;
  background: var(--surface); color: var(--text);
  font-size: 5vh; font-family: 'Baloo 2', sans-serif; font-weight: 1000;
  text-align: center; outline: none; -moz-appearance: textfield;
  touch-action: manipulation;
  user-select: text; -webkit-user-select: text;
}
.qinp::-webkit-inner-spin-button,
.qinp::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── CONFIRM BUTTON ── */
.calcbtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: none; border-radius: 2vh;
  background: var(--accent); color: #fff;
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: opacity .08s, transform .07s;
  letter-spacing: 0.2px;
}
.calcbtn:active { opacity: .85; transform: scale(.98); }

/* ── SUMMARY CARD ── */
.sumcard {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  border-radius: 2vh;
  border: 2px solid var(--border);
  padding: 2.5vh 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bkrow {
  display: flex; justify-content: space-between;
  font-size: 2vh; color: var(--text2);
  padding: 0.7vh 0; font-weight: 400;
  font-family: Arial, sans-serif;
}
.bkrow span:last-child { font-weight: 600; color: var(--text); font-size: 2vh; }
.dvdr { border: none; border-top: 2px dashed var(--border); margin: 1.5vh 0; }

.frow {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--accent);
  border-radius: 1.5vh;
  padding: 2vh 18px; margin-top: 0.8vh;
}
.flbl { font-size: 4.5vh; font-weight: 700; color: rgba(255,255,255,.80); }
.fval { font-family: 'Baloo 2', sans-serif; font-size: 4.5vh; font-weight: 800; color: #fff; line-height: 1; }

/* ── EDIT BUTTON ── */
.ebtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: none; border-radius: 2vh;
  background: #C0392B; color: #fff;
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: opacity .08s, transform .07s;
}
.ebtn:active { opacity: .85; transform: scale(.98); }

/* ── REFRESH BUTTON ── */
.rbtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: 2px solid var(--border); border-radius: 2vh;
  background: var(--surface); color: var(--text2);
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: background .08s, transform .07s, color .08s;
}
.rbtn:active { background: #D0CCC5; color: var(--text); transform: scale(.98); }
</style>
</head>
<body>

<header>
  <div class="hicon" id="hicon">🛍️</div>
  <div class="htext">
    <h1 id="htitle">Rahul Thakur <br> Calculator</h1>
  </div>
</header>

<div class="scroll">

  <!-- INPUT VIEW -->
  <div id="view-input">

    <div class="scard" id="c-pc">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji ec">📄</div>
          <div><div class="sname">Photo Copy</div><div class="srate">₹3 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'pc',-1)" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-pc" value="0" oninput="sq('pc',this.value)" onblur="sb('pc')" onfocus="sf('pc')">
        <button class="qbtn" ontouchstart="ch(event,'pc',1)" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-sp">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji es">🖨️</div>
          <div><div class="sname">Saada Printout</div><div class="srate">₹5 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'sp',-1)" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-sp" value="0" oninput="sq('sp',this.value)" onblur="sb('sp')" onfocus="sf('sp')">
        <button class="qbtn" ontouchstart="ch(event,'sp',1)" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-cp">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji ecp">🌈</div>
          <div><div class="sname">Colored Printout</div><div class="srate">₹10 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'cp',-1)" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-cp" value="0" oninput="sq('cp',this.value)" onblur="sb('cp')" onfocus="sf('cp')">
        <button class="qbtn" ontouchstart="ch(event,'cp',1)" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-ph">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji eph">🎨</div>
          <div><div class="sname">Colored Photocopy</div><div class="srate">₹10 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'ph',-1)" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-ph" value="0" oninput="sq('ph',this.value)" onblur="sb('ph')" onfocus="sf('ph')">
        <button class="qbtn" ontouchstart="ch(event,'ph',1)" onclick="return false">+</button>
      </div>
    </div>

    <button class="calcbtn" ontouchstart="" onclick="showResult()">Confirm</button>

  </div>

  <!-- RESULT VIEW -->
  <div id="view-result">

    <div class="sumcard">
      <div id="bk"></div>
      <div class="dvdr"></div>
      <div class="frow">
        <span class="flbl">Total</span>
        <span class="fval" id="fin">₹0</span>
      </div>
    </div>

    <button class="ebtn" ontouchstart="" onclick="goBack()">✏️&nbsp; Edit</button>
    <button class="rbtn" ontouchstart="" onclick="reset()">🔄&nbsp; Refresh</button>

  </div>

</div>

<script>
const SVC = [
  {id:'pc', rate:3,  name:'Photo Copy'},
  {id:'sp', rate:5,  name:'Saada Printout'},
  {id:'cp', rate:10, name:'Colored Printout'},
  {id:'ph', rate:10, name:'Colored Photocopy'},
];
const Q = {pc:0, sp:0, cp:0, ph:0};
let inputFocused = false;

function ch(e, id, d) {
  if (e) e.preventDefault();
  Q[id] = Math.max(0, Q[id] + d);
  document.getElementById('q-'+id).value = Q[id];
}
function sq(id, v) {
  Q[id] = Math.max(0, parseInt(v)||0);
}
function sf(id) {
  const inp = document.getElementById('q-'+id);
  if (inp.value === '0') inp.value = '';
  inputFocused = true;
}
function sb(id) {
  const inp = document.getElementById('q-'+id);
  if (inp.value === '' || inp.value === null) {
    inp.value = 0; Q[id] = 0;
  }
  setTimeout(() => { inputFocused = false; }, 300);
}

function showResult() {
  if (inputFocused) return;
  let total = 0;
  const items = [];
  SVC.forEach(s => {
    const q = Q[s.id], amt = q * s.rate;
    total += amt;
    if (q > 0) items.push({ name: s.name + ' (₹' + s.rate + ' × ' + q + ')', amt: '₹' + amt });
  });
  document.getElementById('fin').textContent = '₹' + total;
  document.getElementById('bk').innerHTML = items.length
    ? items.map(i => `<div class="bkrow"><span>${i.name}</span><span>${i.amt}</span></div>`).join('')
    : '<div class="bkrow"><span style="color:var(--border)">Koi item nahi</span></div>';

  // ── Header update ──
  document.getElementById('hicon').textContent = '🎉';
  document.getElementById('htitle').innerHTML = 'Thanks for <br> Shopping!';

  document.getElementById('view-input').style.display  = 'none';
  document.getElementById('view-result').style.display = 'flex';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('hicon').textContent = '🛍️';
  document.getElementById('htitle').innerHTML = 'Rahul Thakur <br> Calculator';
  document.getElementById('view-input').style.display  = 'flex';
  document.getElementById('view-result').style.display = 'none';
}

function reset() {
  SVC.forEach(s => {
    Q[s.id] = 0;
    document.getElementById('q-'+s.id).value = 0;
  });

  // ── Header restore ──
  document.getElementById('hicon').textContent = '🛍️';
  document.getElementById('htitle').innerHTML = 'Rahul Thakur <br> Calculator';

  document.getElementById('view-input').style.display  = 'flex';
  document.getElementById('view-result').style.display = 'none';
}

document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, {passive: false});
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTap = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
